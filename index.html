<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Complice</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #c8102e;
  --red-bright: #ff1a3e;
  --red-dim: #6b0817;
  --gold: #c9a84c;
  --gold-light: #e8c86a;
  --ink: #0a0a0b;
  --dark: #111115;
  --panel: #16161c;
  --panel-light: #1e1e28;
  --text: #e8e4dc;
  --text-dim: #8a8070;
  --border: rgba(200, 16, 46, 0.2);
}

html, body {
  min-height: 100vh;
  background: var(--ink);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* â”€â”€ NOISE GRAIN â”€â”€ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.5;
}

/* â”€â”€ VIGNETTE â”€â”€ */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
  pointer-events: none;
  z-index: 998;
}

/* â”€â”€ DIAGONAL LINES BG â”€â”€ */
.bg-lines {
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    -55deg,
    transparent,
    transparent 40px,
    rgba(200,16,46,0.025) 40px,
    rgba(200,16,46,0.025) 41px
  );
  pointer-events: none;
  z-index: 0;
}

/* â”€â”€ LAYOUT â”€â”€ */
.scene {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* â”€â”€ CARD â”€â”€ */
.card {
  width: 100%;
  max-width: 560px;
  background: var(--panel);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--red), var(--gold), var(--red), transparent);
}

/* â”€â”€ CORNER MARKS â”€â”€ */
.card::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 60px; height: 60px;
  border-bottom: 2px solid var(--red-dim);
  border-right: 2px solid var(--red-dim);
  pointer-events: none;
}

.card-inner {
  padding: 48px 44px;
}

/* â”€â”€ CASE LABEL â”€â”€ */
.case-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.case-label::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--red);
}
.case-label::after {
  content: '';
  display: inline-block;
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* â”€â”€ TITLE â”€â”€ */
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 10vw, 5.5rem);
  line-height: 0.9;
  letter-spacing: 0.04em;
  color: var(--text);
  margin-bottom: 6px;
}
h1 span {
  color: var(--red);
  display: block;
}

.subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
}

/* â”€â”€ BODY TEXT â”€â”€ */
.body-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-dim);
  margin-bottom: 40px;
  border-left: 2px solid var(--red-dim);
  padding-left: 20px;
}

/* â”€â”€ BUTTON â”€â”€ */
.btn-primary {
  background: transparent;
  border: 1px solid var(--red);
  color: var(--text);
  padding: 16px 32px;
  width: 100%;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: color 0.3s;
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--red);
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.7, 0, 0.3, 1);
}
.btn-primary:hover::before { transform: translateX(0); }
.btn-primary:hover { color: #fff; }
.btn-primary span { position: relative; z-index: 1; }

/* â”€â”€ ANSWER BUTTONS â”€â”€ */
.btn-answer {
  background: transparent;
  border: 1px solid rgba(200, 16, 46, 0.15);
  border-left: 3px solid var(--red-dim);
  color: var(--text-dim);
  padding: 14px 20px;
  width: 100%;
  margin-bottom: 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  font-weight: 300;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  display: block;
}
.btn-answer::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
  transform: scaleY(0);
  transition: transform 0.25s;
}
.btn-answer:hover {
  border-color: rgba(200,16,46,0.5);
  color: var(--text);
  background: rgba(200,16,46,0.06);
  padding-left: 28px;
}
.btn-answer:hover::before { transform: scaleY(1); }

/* â”€â”€ QUESTION NUMBER â”€â”€ */
.q-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 24px;
}
.q-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 5rem;
  line-height: 1;
  color: rgba(200,16,46,0.12);
  letter-spacing: 0.05em;
}
.q-counter {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  padding-bottom: 6px;
}

/* â”€â”€ PROGRESS BAR â”€â”€ */
.progress-track {
  width: 100%;
  height: 2px;
  background: rgba(200,16,46,0.1);
  margin-bottom: 32px;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red-dim), var(--red));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px;
  background: var(--red);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--red);
}

/* â”€â”€ QUESTION TEXT â”€â”€ */
.question-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(1.2rem, 4vw, 1.6rem);
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 28px;
  letter-spacing: 0.01em;
}

/* â”€â”€ RESULT â”€â”€ */
.result-role {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  line-height: 1;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.result-role .role-label {
  color: var(--text-dim);
  font-size: 0.4em;
  letter-spacing: 0.3em;
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.result-role .role-name {
  color: var(--red);
}

.result-desc {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-dim);
  margin: 24px 0;
  border-left: 2px solid var(--red-dim);
  padding-left: 20px;
}

.result-mission {
  background: rgba(200, 16, 46, 0.06);
  border: 1px solid rgba(200, 16, 46, 0.2);
  padding: 20px 24px;
  margin-top: 28px;
}
.result-mission-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.result-mission-label::before {
  content: 'â–¸';
  color: var(--red);
}
.result-mission p {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
}

/* â”€â”€ HIDDEN â”€â”€ */
.hidden { display: none; }

/* â”€â”€ FADE IN â”€â”€ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeUp 0.6s ease both; }

.fade-in {
  animation: fadeUp 0.4s ease both;
}

/* â”€â”€ STAMP â”€â”€ */
.stamp {
  position: absolute;
  top: 24px; right: 24px;
  width: 64px; height: 64px;
  border: 2px solid rgba(200,16,46,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: rgba(200,16,46,0.4);
  text-align: center;
  line-height: 1.3;
}
</style>
</head>
<body>
<div class="bg-lines"></div>

<div class="scene">

  <!-- INTRO -->
  <div class="card" id="intro">
    <div class="card-inner">
      <div class="case-label">Dossier confidentiel</div>
      <h1>Mission<span>Complice</span></h1>
      <p class="body-text">
        Une Ă©quipe se forme. Un plan se dessine. Mais dans ce genre d'opĂ©ration, chaque rĂ´le est crucial.<br><br>
        DĂ©couvre le tien et vois si tu as ce qu'il faut pour rĂ©ussir le braquage parfait.<br><br>
        PrĂ©pare-toi : il n'y aura pas de seconde chance.
      </p>
      <button class="btn-primary" id="startBtn"><span>â†ł Lancer la mission</span></button>
    </div>
    <div class="stamp">CONFIDENTIEL</div>
  </div>

  <!-- QUIZ -->
  <div class="card hidden" id="quiz">
    <div class="card-inner" id="quizInner">
    </div>
  </div>

  <!-- RESULT -->
  <div class="card hidden" id="result">
    <div class="card-inner" id="resultInner">
    </div>
  </div>

</div>

<script>
// â”€â”€ QUESTIONS â”€â”€ map: [Aâ†’profil, Bâ†’profil, Câ†’profil, Dâ†’profil]
// S=StratĂ¨ge, L=Leader, B=Brute, G=Gestionnaire, H=Hacker
const questions = [
  { q: "L'entrĂ©e est compromise. Que fais-tu ?",
    a: ["J'analyse les sorties alternatives en quelques secondes","Je prends le contrĂ´le et redirige tout le monde","Je force le passage sans hĂ©siter","Je sĂ©curise les ressources avant de bouger"],
    map: ['S','L','B','G'] },
  { q: "Un membre de l'Ă©quipe panique en pleine opĂ©ration",
    a: ["Je le recadre calmement avec des instructions prĂ©cises","Je prends sa place immĂ©diatement","Je lui ordonne de se taire et d'avancer","J'Ă©value s'il devient un risque pour la mission"],
    map: ['S','L','B','G'] },
  { q: "Le plan ne se dĂ©roule pas comme prĂ©vu",
    a: ["J'adapte la stratĂ©gie en temps rĂ©el","Je dĂ©cide d'un nouveau plan et je l'impose","Je continue malgrĂ© tout, coĂ»te que coĂ»te","Je protĂ¨ge ce qui peut encore ĂŞtre sauvĂ©"],
    map: ['S','L','B','G'] },
  { q: "Une opportunitĂ© imprĂ©vue apparaĂ®t",
    a: ["Je calcule le risque avant d'agir","Je tranche rapidement pour en tirer avantage","Je saute dessus sans rĂ©flĂ©chir","J'Ă©value l'impact sur l'objectif principal"],
    map: ['S','L','B','G'] },
  { q: "Tu dois infiltrer un lieu sous surveillance",
    a: ["J'identifie les failles du systĂ¨me","Je coordonne l'entrĂ©e avec prĂ©cision","Je passe en force si nĂ©cessaire","Je m'assure que tout est parfaitement synchronisĂ©"],
    map: ['H','L','B','G'] },
  { q: "Un compte Ă  rebours est lancĂ©",
    a: ["Je garde mon sang-froid et optimise chaque seconde","Je donne des ordres clairs et rapides","J'accĂ©lĂ¨re tout, peu importe les risques","Je sĂ©curise l'essentiel avant la fin"],
    map: ['S','L','B','G'] },
  { q: "Un inconnu propose son aide",
    a: ["Je teste sa fiabilitĂ© discrĂ¨tement","Je dĂ©cide rapidement de l'intĂ©grer ou non","Je le repousse violemment","J'analyse ce qu'il peut apporter concrĂ¨tement"],
    map: ['S','L','B','G'] },
  { q: "L'Ă©quipe est divisĂ©e sur une dĂ©cision",
    a: ["Je propose une solution rationnelle","Je tranche et impose la direction","Je fais pression pour faire avancer","Je cherche un compromis efficace"],
    map: ['S','L','B','G'] },
  { q: "Une alarme se dĂ©clenche",
    a: ["Je cherche immĂ©diatement l'origine","Je dirige l'Ă©vacuation","Je neutralise la menace","Je sĂ©curise les gains"],
    map: ['H','L','B','G'] },
  { q: "Ă€ la fin de l'opĂ©ration, que fais-tu ?",
    a: ["J'analyse ce qui aurait pu ĂŞtre amĂ©liorĂ©","Je m'assure que chacun a suivi mes directives","Je vĂ©rifie que personne ne nous suit","Je fais le bilan des ressources obtenues"],
    map: ['S','L','H','G'] }
];

// â”€â”€ RĂ”LES â”€â”€
const MISSION = "Un coffre s'est posĂ© sur la plus grande place de ta ville. Sois attentif aux affiches pour dĂ©couvrir le code et l'ouvrir.<br><br>Tu as jusqu'au 2 mai pour tester le code que tu auras trouvĂ©.<br><br>Chaque rĂ´le a sa clĂ©â€¦ Seras-tu assez perspicace pour la dĂ©couvrir ?";

const roleData = {
  S: { name: 'Le StratĂ¨ge',
    desc: ["Tu es dĂ©sormais un complice du braquage.", "Ton esprit est ton arme principale. LĂ  oĂą d'autres voient du chaos, tu vois des schĂ©mas, des failles, des opportunitĂ©s.", "Tu as Ă©tĂ© choisi pour anticiper l'imprĂ©visible et ajuster chaque mouvement avant mĂŞme qu'il ne devienne nĂ©cessaire.", "Dans l'Ă©quipe, tu es celui qu'on consulte avant d'agirâ€¦ et celui qui Ă©vite les erreurs fatales.", "Sans toi, il n'y a pas de plan. Et sans plan, il n'y a pas de sortie."] },
  L: { name: 'Le Leader',
    desc: ["Tu es dĂ©sormais un complice du braquage.", "Quand la pression monte, tous les regards se tournent vers toi. Tu dĂ©cides. Tu imposes. Tu assumes.", "Tu as Ă©tĂ© sĂ©lectionnĂ© pour ta capacitĂ© Ă  garder le contrĂ´le lĂ  oĂą les autres vacillent.", "Dans l'Ă©quipe, tu es la voix qui tranche et la prĂ©sence qui stabilise.", "Ce braquage avancera Ă  ton rythme. Et personne ne remettra Ă§a en question."] },
  B: { name: 'La Brute',
    desc: ["Tu es dĂ©sormais un complice du braquage.", "Tu es l'impact. La force brute. Le moment oĂą tout bascule.", "Tu as Ă©tĂ© choisi parce que tu agis lĂ  oĂą d'autres hĂ©sitent. Tu avances, tu frappes, tu ouvres la voie.", "Dans l'Ă©quipe, tu es la solution quand il n'y en a plus.", "Quand la situation dĂ©gĂ©nĂ¨reâ€¦ c'est lĂ  que tu deviens indispensable."] },
  G: { name: 'Le Gestionnaire',
    desc: ["Tu es dĂ©sormais un complice du braquage.", "Tu ne laisses rien au hasard. Ressources, timing, logistique : tout passe par toi.", "Tu as Ă©tĂ© sĂ©lectionnĂ© pour ta rigueur et ta capacitĂ© Ă  garder le contrĂ´le sur ce qui compte vraiment.", "Dans l'Ă©quipe, tu es celui qui garantit que l'opĂ©ration reste viable jusqu'au bout.", "Sans toi, le braquage rĂ©ussit peut-ĂŞtreâ€¦ mais il ne tient jamais."] },
  H: { name: 'Le Hacker',
    desc: ["Tu es dĂ©sormais un complice du braquage.", "Les systĂ¨mes, les sĂ©curitĂ©s, les barriĂ¨resâ€¦ ne sont pour toi que des illusions Ă  contourner.", "Tu as Ă©tĂ© choisi pour ton intelligence froide et ta capacitĂ© Ă  infiltrer sans laisser de trace.", "Dans l'Ă©quipe, tu es invisible mais essentiel.", "Quand une porte est fermĂ©e, tu ne la forces pas. Tu la fais disparaĂ®tre."] },
  I: { name: "L'ImprĂ©visible",
    desc: ["Tu es dĂ©sormais un complice du braquage.", "Impossible Ă  lire. Impossible Ă  anticiper. Et c'est exactement pour Ă§a que tu es lĂ .", "Tu as Ă©tĂ© sĂ©lectionnĂ© parce que tu brises les schĂ©mas et dĂ©stabilises tout ce qui est trop prĂ©visible.", "Dans l'Ă©quipe, tu es le facteur chaosâ€¦ celui qui fait basculer une situation bloquĂ©e.", "On ne sait jamais ce que tu vas faire. Mais on sait que Ă§a peut tout changer."] }
};

// â”€â”€ Ă‰TAT â”€â”€
const LETTERS = ['A','B','C','D'];
let current = 0;
let answers = [];

// â”€â”€ LOGIQUE D'ATTRIBUTION â”€â”€
function computeRole() {
  const score = { S:0, L:0, B:0, G:0, H:0 };
  answers.forEach(p => { if (p in score) score[p]++; });

  const maxScore = Math.max(...Object.values(score));
  const winners = Object.keys(score).filter(k => score[k] === maxScore);
  const profilesUsed = Object.keys(score).filter(k => score[k] > 0);

  // L'ImprĂ©visible : aucun profil dominant (max â‰¤ 3) ET au moins 3 profils diffĂ©rents
  if (maxScore <= 3 && profilesUsed.length >= 3) return 'I';

  // Le Hacker : H est dans les gagnants ET a au moins 2 votes
  if (winners.includes('H') && score['H'] >= 2) return 'H';

  // PrioritĂ© en cas d'Ă©galitĂ© : S > L > B > G > H
  for (const p of ['S','L','B','G','H']) {
    if (winners.includes(p)) return p;
  }
  return 'S';
}

// â”€â”€ AFFICHAGE QUESTION â”€â”€
function showQuestion() {
  if (current >= questions.length) { showResult(); return; }

  const q = questions[current];
  const pct = (current / questions.length) * 100;
  const inner = document.getElementById('quizInner');
  const num = String(current + 1).padStart(2, '0');

  inner.innerHTML = `
    <div class="fade-in">
      <div class="case-label">Situation ${current + 1}</div>
      <div class="q-meta">
        <div class="q-number">${num}</div>
        <div class="q-counter">${current + 1} / ${questions.length}</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question-text">${q.q}</div>
    </div>`;

  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-answer fade-in';
    btn.style.animationDelay = `${0.05 * i + 0.1}s`;
    btn.innerHTML = `<strong style="font-family:'Barlow Condensed';font-size:11px;letter-spacing:0.2em;color:var(--red);margin-right:12px;">${LETTERS[i]}.</strong>${ans}`;
    btn.onclick = () => {
      answers.push(q.map[i]);
      current++;
      showQuestion();
    };
    inner.appendChild(btn);
  });
}

// â”€â”€ AFFICHAGE RĂ‰SULTAT â”€â”€
function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  const key = computeRole();
  const data = roleData[key];
  const descHTML = data.desc.map(line => `<p style="margin-bottom:10px;">${line}</p>`).join('');

  const resultDiv = document.getElementById('result');
  resultDiv.classList.remove('hidden');
  document.getElementById('resultInner').innerHTML = `
    <div class="fade-in">
      <div class="case-label">IdentitĂ© confirmĂ©e</div>
      <div class="result-role">
        <span class="role-label">Ton rĂ´le</span>
        <span class="role-name">${data.name}</span>
      </div>
      <div class="result-desc">${descHTML}</div>
      <div class="result-mission">
        <div class="result-mission-label">Prochaine mission</div>
        <p>${MISSION}</p>
        <a href="https://www.instagram.com/netflixfr/" target="_blank" rel="noopener" style="display:inline-block;margin-top:16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.4);padding-bottom:2px;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='var(--gold-light)';this.style.borderColor='var(--gold-light)'" onmouseout="this.style.color='var(--gold)';this.style.borderColor='rgba(201,168,76,0.4)'">â†ł Abonne-toi Ă  l'Instagram Netflix pour rejoindre le canal</a>
      </div>

// â”€â”€ PARTAGE â”€â”€
function shareRole(roleName, platform) {
  const text = `Je viens de dĂ©couvrir mon rĂ´le dans Mission Complice : ${roleName} đźŽŻ Et toi, quel est le tien ? #MissionComplice #Netflix`;
  const url = window.location.href;
  if (platform === 'twitter') {
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
  } else if (platform === 'facebook') {
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`, '_blank');
  } else if (platform === 'copy') {
    navigator.clipboard.writeText(text + ' ' + url).then(() => {
      const btn = document.getElementById('copyBtn');
      const orig = btn.textContent;
      btn.textContent = 'âś“ CopiĂ© !';
      btn.style.borderColor = 'var(--gold)';
      btn.style.color = 'var(--gold)';
      setTimeout(() => { btn.textContent = orig; btn.style.borderColor = 'rgba(200,16,46,0.3)'; btn.style.color = 'var(--text-dim)'; }, 2000);
    });
  }
}

document.getElementById('startBtn').onclick = () => {
  document.getElementById('intro').classList.add('hidden');
  const quiz = document.getElementById('quiz');
  quiz.classList.remove('hidden');
  quiz.style.animation = 'none';
  void quiz.offsetHeight;
  quiz.style.animation = '';
  showQuestion();
};
